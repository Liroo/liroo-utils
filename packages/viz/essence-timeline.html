.803,"e":null,"eb":0,"ev":"marker","s":"Echo","cost":2,"oc":false},{"t":545.804,"e":0,"eb":0,"ev":"spend","oc":false},{"t":548.339,"e":null,"eb":0,"ev":"marker","s":"Obsidian Scales","cost":0,"oc":false},{"t":551.072,"e":null,"eb":1,"ev":"marker","s":"Temporal Anomaly","cost":0,"oc":false},{"t":551.774,"e":null,"eb":2,"ev":"marker","s":"Merithra's Blessing","cost":0,"oc":false},{"t":552.957,"e":null,"eb":1,"ev":"marker","s":"Emerald Blossom","cost":0,"oc":false},{"t":554.152,"e":null,"eb":1,"ev":"marker","s":"Dream Breath","cost":0,"oc":false},{"t":554.746,"e":null,"eb":1,"ev":"marker","s":"Dream Breath","cost":0,"oc":false},{"t":555.395,"e":null,"eb":1,"ev":"marker","s":"Emerald Blossom","cost":0,"oc":false},{"t":556.624,"e":null,"eb":0,"ev":"marker","s":"Echo","cost":0,"oc":false},{"t":557.802,"e":null,"eb":0,"ev":"marker","s":"Merithra's Blessing","cost":0,"oc":false},{"t":559.043,"e":null,"eb":0,"ev":"marker","s":"Verdant Embrace","cost":0,"oc":false},{"t":559.045,"e":null,"eb":0,"ev":"marker","s":"Verdant Embrace (cast)","cost":0,"oc":false},{"t":561.501,"e":null,"eb":1,"ev":"marker","s":"Temporal Anomaly","cost":0,"oc":false},{"t":561.67,"e":null,"eb":1,"ev":"marker","s":"Dream Flight","cost":0,"oc":false}],"summary":{"totalEssenceSpent":141,"totalEssenceWasted":5,"timeAtMaxEssence":20397,"timeAtMaxEssencePercent":3.6,"totalCastsWithEssenceCost":68,"essenceBurstUptime":206467,"essenceBurstUptimePercent":36.6}};

const SPELL_COLORS = {
  "Echo": "#bc8cff", "Dream Breath": "#f0883e", "Emerald Blossom": "#3fb950",
  "Temporal Anomaly": "#56d4dd", "Rewind": "#f778ba", "Dream Flight": "#f778ba",
  "Fire Breath": "#f85149", "Merithra's Blessing": "#d2a8ff", "Reversion": "#7ee787",
  "Verdant Embrace": "#7ee787", "Chrono Flames": "#ffa657", "Naturalize": "#a5d6ff",
};
const ABBREV = {
  "Dream Breath": "DB", "Emerald Blossom": "EmB", "Echo": "Ec",
  "Temporal Anomaly": "TA", "Rewind": "RW", "Dream Flight": "DF",
  "Fire Breath": "FB", "Merithra's Blessing": "MB", "Reversion": "Rev",
  "Verdant Embrace": "VE", "Tip the Scales": "TtS", "Chrono Flames": "CF",
};

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

function renderPlayer(containerId, data) {
  const el = d3.select(`#${containerId}`);
  el.append("div").attr("class", "player-name").text(data.playerName);

  const s = data.summary;
  const stats = el.append("div").attr("class", "summary-stats");
  const add = (v, l, c) => {
    const d = stats.append("div").attr("class", `stat ${c||""}`);
    d.append("div").attr("class", "stat-value").text(v);
    d.append("div").attr("class", "stat-label").text(l);
  };
  add(s.totalEssenceSpent, "Essence Spent");
  add(s.totalEssenceWasted, "Wasted (overcap)", s.totalEssenceWasted > 70 ? "bad" : "warn");
  add(`${s.timeAtMaxEssencePercent.toFixed(0)}%`, "Time at 5/5", s.timeAtMaxEssencePercent > 50 ? "bad" : "warn");
  add(s.totalCastsWithEssenceCost, "Casts w/ Essence");
  add(`${s.essenceBurstUptimePercent.toFixed(0)}%`, "EB Uptime");

  const chart = el.append("div").attr("class", "chart-container");
  const margin = { top: 10, right: 16, bottom: 30, left: 36 };
  const W = 1500, H = 300;

  const svg = chart.append("svg")
    .attr("width", W + margin.left + margin.right)
    .attr("height", H + margin.top + margin.bottom)
    .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const durS = data.fightDurationMs / 1000;
  const x = d3.scaleLinear().domain([0, durS]).range([0, W]);
  const y = d3.scaleLinear().domain([0, 5]).range([H, 0]);

  // Axes
  svg.append("g").attr("transform", `translate(0,${H})`)
    .call(d3.axisBottom(x).tickFormat(formatTime).ticks(Math.floor(durS/30)))
    .selectAll("text").attr("fill","#8b949e").attr("font-size",10);
  svg.select(".domain").attr("stroke","#30363d");
  svg.selectAll(".tick line").attr("stroke","#30363d");
  svg.append("g").call(d3.axisLeft(y).tickValues([0,1,2,3,4,5]))
    .selectAll("text").attr("fill","#8b949e").attr("font-size",10);
  [1,2,3,4,5].forEach(v => svg.append("line")
    .attr("x1",0).attr("x2",W).attr("y1",y(v)).attr("y2",y(v))
    .attr("stroke","#21262d").attr("stroke-dasharray","2,4"));

  // Essence line data (only real points, not markers)
  const lineData = data.timeline.filter(p => p.ev !== "marker" && p.e !== null);

  // EB spans
  let ebSpans = [], ebS = null;
  for (const p of data.timeline) {
    if (p.eb > 0 && ebS === null) ebS = p.t;
    else if (p.eb === 0 && ebS !== null) { ebSpans.push([ebS, p.t]); ebS = null; }
  }
  if (ebS !== null) ebSpans.push([ebS, durS]);
  svg.selectAll(".eb").data(ebSpans).join("rect")
    .attr("x",d=>x(d[0])).attr("width",d=>Math.max(1,x(d[1])-x(d[0])))
    .attr("y",0).attr("height",H).attr("fill","rgba(210,153,34,0.1)");

  // Overcap spans
  let ocSpans = [], ocS = null;
  for (const p of lineData) {
    if (p.oc && ocS === null) ocS = p.t;
    else if (!p.oc && ocS !== null) { ocSpans.push([ocS, p.t]); ocS = null; }
  }
  if (ocS !== null) ocSpans.push([ocS, durS]);
  svg.selectAll(".oc").data(ocSpans).join("rect")
    .attr("x",d=>x(d[0])).attr("width",d=>Math.max(1,x(d[1])-x(d[0])))
    .attr("y",0).attr("height",H).attr("fill","rgba(248,81,73,0.08)");

  // Area under curve
  svg.append("path").datum(lineData)
    .attr("fill","rgba(63,185,80,0.08)")
    .attr("d", d3.area().x(d=>x(d.t)).y0(H).y1(d=>y(d.e)).curve(d3.curveStepAfter));

  // Essence staircase line
  svg.append("path").datum(lineData)
    .attr("fill","none").attr("stroke","#3fb950").attr("stroke-width",2)
    .attr("d", d3.line().x(d=>x(d.t)).y(d=>y(d.e)).curve(d3.curveStepAfter));

  // Cast markers (all casts, positioned on the line)
  const tooltip = d3.select("#tooltip");
  const markers = data.timeline.filter(p => p.ev === "marker" && p.s);

  // For each marker, find current essence from the line at that time
  function essenceAt(t) {
    let e = 5;
    for (const p of lineData) {
      if (p.t > t) break;
      e = p.e;
    }
    return e;
  }

  // Marker dots along the top of the chart
  const markerY = -4; // just above chart
  svg.selectAll(".marker-tick").data(markers).join("line")
    .attr("x1", d => x(d.t)).attr("x2", d => x(d.t))
    .attr("y1", H).attr("y2", d => {
      const e = essenceAt(d.t);
      return y(e);
    })
    .attr("stroke", d => SPELL_COLORS[d.s] || "#484f58")
    .attr("stroke-width", 1)
    .attr("opacity", d => {
      if (["Echo","Dream Breath","Emerald Blossom","Rewind","Dream Flight","Temporal Anomaly"].includes(d.s)) return 0.4;
      return 0.15;
    });

  svg.selectAll(".marker-dot").data(markers).join("circle")
    .attr("cx", d => x(d.t))
    .attr("cy", d => y(essenceAt(d.t)))
    .attr("r", d => {
      if (d.s === "Echo") return 3.5;
      if (["Dream Breath","Emerald Blossom","Rewind","Dream Flight"].includes(d.s)) return 4;
      return 2;
    })
    .attr("fill", d => SPELL_COLORS[d.s] || "#484f58")
    .attr("opacity", d => {
      if (["Echo","Dream Breath","Emerald Blossom","Rewind","Dream Flight","Temporal Anomaly"].includes(d.s)) return 0.85;
      return 0.3;
    })
    .on("mouseover", function(ev, d) {
      d3.select(this).attr("r", 7).attr("opacity", 1);
      const e = essenceAt(d.t);
      const ebTxt = d.eb > 0 ? `<span style="color:#d29922"> EB ×${d.eb}</span>` : "";
      const costTxt = d.cost > 0 ? ` → ${e - d.cost}/5` : "";
      tooltip.html(
        `<div style="color:${SPELL_COLORS[d.s]||'#58a6ff'};font-weight:600">${d.s}</div>` +
        `<div style="color:#8b949e">${formatTime(d.t)} &middot; Essence: ${e}/5${costTxt}${ebTxt}</div>`
      )
      .style("left", (ev.pageX + 14) + "px")
      .style("top", (ev.pageY - 14) + "px")
      .style("opacity", 1);
    })
    .on("mouseout", function(ev, d) {
      d3.select(this).attr("r", d.s === "Echo" ? 3.5 : ["Dream Breath","Emerald Blossom"].includes(d.s) ? 4 : 2)
        .attr("opacity", ["Echo","Dream Breath","Emerald Blossom","Rewind","Dream Flight","Temporal Anomaly"].includes(d.s) ? 0.85 : 0.3);
      tooltip.style("opacity", 0);
    });

  // Labels for key spells (don't overcrowd)
  let lastLbl = -10;
  const lbls = markers.filter(d => {
    if (!["Dream Breath","Rewind","Dream Flight"].includes(d.s)) return false;
    if (d.t - lastLbl < 12) return false;
    lastLbl = d.t; return true;
  });
  svg.selectAll(".lbl").data(lbls).join("text")
    .attr("x", d => x(d.t)).attr("y", d => y(essenceAt(d.t)) - 10)
    .attr("text-anchor","middle").attr("font-size",9)
    .attr("fill", d => SPELL_COLORS[d.s] || "#8b949e").attr("opacity",0.6)
    .text(d => ABBREV[d.s] || d.s.slice(0,3));

  svg.append("text").attr("transform","rotate(-90)")
    .attr("y",-24).attr("x",-H/2).attr("text-anchor","middle")
    .attr("fill","#484f58").attr("font-size",11).text("Essence");
}

renderPlayer("liroo-section", lirooData);
renderPlayer("echodrake-section", echodrakeData);
</script>
